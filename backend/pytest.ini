[pytest]
# Pytest configuration for AI Muse Blog

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio configuration
asyncio_mode = auto

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show extra test summary info
    -ra
    # Enable coverage
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70
    # Markers
    -m "not slow"
    # Warnings
    -W ignore::DeprecationWarning

# Markers
markers =
    asyncio: mark test as async
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage configuration
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2

[coverage:html]
directory = htmlcov
